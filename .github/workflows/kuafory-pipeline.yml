name: Kuafory Otomatik Yayinlama (CI)

# 1. TETİKLEYİCİ: Bu sistem ne zaman çalışsın?
on:
  push:
    branches:
      - main # Sadece 'main' (ana) dala yeni kod geldiğinde çalış.

jobs:
  build-ve-push-islemi:
    runs-on: ubuntu-latest # GitHub'ın bize o anlık vereceği temiz bir Linux sunucusu.

    steps:
      # Adım 1: Kuafory kodlarını GitHub'dan bu anlık sunucuya indir.
      - name: Kodlari Sunucuya Cek (Checkout)
        uses: actions/checkout@v3

      # Adım 2: Senin adına Docker Hub'a güvenli giriş yap.
      - name: Docker Hub'a Giris Yap
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }} 

      # Adım 3: Manuel yaptığımız o "build" ve "push" işlemlerini otomatik yap.
      - name: Imajı Insa Et (Build) ve Gonder (Push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: erencoskun11/kuafory-web:latest